# ChainGuard-Core — classifier service Deployment (Phase 4.1).
#
# Streams financial-features → LightGBM → anomaly-scores. Mirrors every
# scored frame into PostgreSQL (feature_log + anomaly_score_log) so the
# Airflow retraining DAG can train on real traffic.
#
# Model artifact lives on a PVC ("chainguard-models") that the Airflow
# trainer pod writes into. The classifier hot-reloads on pod restart.
#
# DATABASE_URL is supplied by the `chainguard-db` Secret. Apply it with:
#   make set-db-url           # reads $DATABASE_URL from the shell

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chainguard-models
  labels:
    app.kubernetes.io/part-of: chainguard-core
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chainguard-classifier-config
  labels:
    app.kubernetes.io/name: chainguard-classifier
    app.kubernetes.io/part-of: chainguard-core
data:
  KAFKA_BROKERS: "chain-kafka.default.svc.cluster.local:9092"
  INPUT_TOPIC: "financial-features"
  OUTPUT_TOPIC: "anomaly-scores"
  CONSUMER_GROUP: "chainguard-classifier"
  SCORE_THRESHOLD: "0.85"
  MODEL_PATH: "/models/baseline.txt"
  WRITE_POSTGRES: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainguard-classifier
  labels:
    app.kubernetes.io/name: chainguard-classifier
    app.kubernetes.io/component: ml-inference
    app.kubernetes.io/part-of: chainguard-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chainguard-classifier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chainguard-classifier
        app.kubernetes.io/component: ml-inference
        app.kubernetes.io/part-of: chainguard-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # The PVC overlays /models, hiding the baseline model baked into the
        # image. Seed the PVC from /app/classifier/models if /models is empty
        # so the classifier has a model on cold start. Airflow retraining
        # later overwrites /models/baseline.txt in-place.
        - name: seed-baseline-model
          image: chainguard-classifier:dev
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ ! -s /models/baseline.txt ]; then
                cp /app/classifier/models/baseline.txt /models/baseline.txt
                echo "seeded /models/baseline.txt"
              else
                echo "/models/baseline.txt already present"
              fi
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: classifier
          image: chainguard-classifier:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: chainguard-classifier-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chainguard-db
                  key: DATABASE_URL
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: chainguard-models
