# ChainGuard-Core — agents service Deployment (Phase 4.2).
#
# Consumes anomaly-scores, filters on high_risk=true, drives the 3-tier
# LangGraph cluster (Forensic → Auditor → Enforcer), and writes the final
# markdown rationale into agent_report.
#
# LLM provider is selected via the LLM_PROVIDER env var. The service
# automatically falls back to LLM_PROVIDER=mock if OPENAI_API_KEY is
# missing, so the pod won't crash-loop while you wire up credentials.

---
apiVersion: v1
kind: Secret
metadata:
  name: chainguard-agents-secrets
  labels:
    app.kubernetes.io/name: chainguard-agents
    app.kubernetes.io/part-of: chainguard-core
type: Opaque
# Apply with:
#   kubectl create secret generic chainguard-agents-secrets \
#       --from-literal=OPENAI_API_KEY=sk-... --dry-run=client -o yaml | kubectl apply -f -
stringData:
  OPENAI_API_KEY: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chainguard-agents-config
  labels:
    app.kubernetes.io/name: chainguard-agents
    app.kubernetes.io/part-of: chainguard-core
data:
  KAFKA_BROKERS: "chain-kafka.default.svc.cluster.local:9092"
  INPUT_TOPIC: "anomaly-scores"
  CONSUMER_GROUP: "chainguard-agents"
  HIGH_RISK_ONLY: "true"
  WRITE_POSTGRES: "true"
  QDRANT_URL: "http://vector-db.default.svc.cluster.local:6333"
  QDRANT_COLLECTION: "attack_vectors"
  LLM_PROVIDER: ""        # blank → auto-select openai / mock by OPENAI_API_KEY
  LLM_MODEL: "gpt-4o-mini"
  PGHOST: "chain-db-postgresql.default.svc.cluster.local"
  PGPORT: "5432"
  PGUSER: "postgres"
  PGDATABASE: "postgres"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainguard-agents
  labels:
    app.kubernetes.io/name: chainguard-agents
    app.kubernetes.io/component: agent-cluster
    app.kubernetes.io/part-of: chainguard-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chainguard-agents
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chainguard-agents
        app.kubernetes.io/component: agent-cluster
        app.kubernetes.io/part-of: chainguard-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agents
          image: chainguard-agents:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: chainguard-agents-config
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: chain-db-postgresql
                  key: postgres-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chainguard-agents-secrets
                  key: OPENAI_API_KEY
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
