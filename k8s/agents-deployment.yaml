# Volatix-AI — agents service Deployment (Phase 4.2).
#
# Consumes anomaly-scores, filters on high_risk=true, drives the 3-tier
# LangGraph cluster (Forensic → Auditor → Enforcer), and writes the final
# markdown rationale into agent_report.
#
# LLM provider is selected via the LLM_PROVIDER env var. The service
# automatically falls back to LLM_PROVIDER=mock if OPENAI_API_KEY is
# missing, so the pod won't crash-loop while you wire up credentials.

# Note: the volatix-agents-secrets Secret is intentionally NOT declared
# here. Re-applying this file would otherwise overwrite real key values with
# empty strings. Create / update it out-of-band via:
#   scripts/set-openai-key.sh   # OpenAI
#   scripts/set-google-key.sh   # Gemini
# The Deployment references it with `optional: true` so the pod boots fine
# before the Secret exists (auto-falls back to MockChatLLM).

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: volatix-agents-config
  labels:
    app.kubernetes.io/name: volatix-agents
    app.kubernetes.io/part-of: volatix-core
data:
  KAFKA_BROKERS: "chain-kafka.default.svc.cluster.local:9092"
  INPUT_TOPIC: "anomaly-scores"
  CONSUMER_GROUP: "volatix-agents"
  HIGH_RISK_ONLY: "true"
  WRITE_POSTGRES: "true"
  QDRANT_URL: "http://vector-db.default.svc.cluster.local:6333"
  QDRANT_COLLECTION: "attack_vectors"
  LLM_PROVIDER: ""        # blank → auto-select gemini / openai / mock by which key is present
  LLM_MODEL: "gemini-2.5-flash"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: volatix-agents
  labels:
    app.kubernetes.io/name: volatix-agents
    app.kubernetes.io/component: agent-cluster
    app.kubernetes.io/part-of: volatix-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: volatix-agents
  template:
    metadata:
      labels:
        app.kubernetes.io/name: volatix-agents
        app.kubernetes.io/component: agent-cluster
        app.kubernetes.io/part-of: volatix-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agents
          image: volatix-agents:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: volatix-agents-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: volatix-db
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: volatix-agents-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: volatix-agents-secrets
                  key: GOOGLE_API_KEY
                  optional: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
